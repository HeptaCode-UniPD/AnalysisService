service: ms2-analysis-service

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-central-1
  memorySize: 512
  iamRoleStatements:
    # Permesso per scrivere su S3 (per la Lambda pullRepo)
    - Effect: Allow
      Action:
        - s3:PutObject
      Resource:
        - !Join ['', [!GetAtt RepositoryBucket.Arn, '/*']]
    # Permesso per il Wrapper NestJS di avviare la Step Function
    - Effect: Allow
      Action:
        - states:StartExecution
      Resource:
        - !Ref RepoAnalysisStateMachine

build:
  esbuild: false

plugins:
  - serverless-step-functions
  - serverless-offline

functions:
  wrapperAdapter:
    handler: src/wrapper/handler.startAnalysis
    environment:
      # Passiamo l'ARN dinamico della Step Function al codice NestJS
      STATE_MACHINE_ARN: !Ref RepoAnalysisStateMachine
    events:
      - http:
          path: /analyze
          method: post

  pullRepoToS3:
    handler: dist/lambdas/pull-repo.handler
    timeout: 60
    memorySize: 1024
    environment:
      S3_BUCKET_NAME: !Ref RepositoryBucket
    layers:
      - arn:aws:lambda:eu-central-1:553035198032:layer:git-lambda2:8

# Definizione della Step Function
stepFunctions:
  stateMachines:
    RepoAnalysisStateMachine:
      name: ms2-pipeline-${sls:stage}
      definition: ${file(state-machine.json)} 

# Creazione del Bucket S3
resources:
  Resources:
    RepositoryBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ms2-analysis-repos-bucket-${sls:stage}-${aws:accountId}
        LifecycleConfiguration:
          Rules:
            - Id: AutoDeleteOldZips
              Status: Enabled
              ExpirationInDays: 1