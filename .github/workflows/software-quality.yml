name: 'Verifica qualità del codice'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verification:
    name: 'Static and Dynamic Analysis'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 1. Analisi Statica (ESLint & Prettier)

        run: npm run lint

      - name: 2. Analisi Dinamica e Test di Unità (3.2.2.2.1)

        run: npm run test:cov

      - name: 3. Verifica Integrità Build

        run: npm run build
