service: ms2-analysis-service

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-central-1
  memorySize: 512

build:
  esbuild: false

plugins:
  - serverless-step-functions
  - serverless-offline

functions:
  wrapperAdapter:
    handler: src/wrapper/handler.startAnalysis
    events:
      - http:
          path: /analyze
          method: post
